services:
  - type: web
    name: shl-assessment-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    envVars:
      - key: GEMINI_API_KEY
        sync: false  # must be set manually in dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: LOW_MEMORY_MODE
        value: "true"
      - key: CATALOG_PATH
        value: data/shl_catalog.json
      - key: ALLOWED_ORIGINS
        sync: false  # set after Vercel deploy
    healthCheckPath: /health
    plan: starter
